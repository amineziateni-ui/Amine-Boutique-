<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amine Boutique - Amine Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { transition: transform 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.03); }
        .navbar-brand { font-size: 1.5rem; color: #febd69 !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color: #232f3e;">
    <a class="navbar-brand fw-bold" href="#">Amine Boutique - Amine Store</a>
</nav>

<div class="container my-5">
    <h3 class="mb-5 text-center fw-bold text-dark>The best clothes are at Amino store</h3>
    <div class="row g-4">
        
        <div class="col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm border-0 p-2">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=500&q=80" class="card-img-top rounded" alt="Nike T-shirt">
                <div class="card-body text-center">
                    <h6 class="fw-bold">Black nike T-shirt</h6>
                    <p class="price mb-2" style="color: #B12704; font-weight: bold;">4,500 د.ج</p>
                    <button class="btn btn-sm w-100 fw-bold" style="background-color: #febd69;" onclick="openOrderModal('تيشرت نايكي أسود - 4500 دج')">اطلب الآن</button>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm border-0 p-2">
                <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=500&q=80" class="card-img-top rounded" alt="Wide Leg Jeans">
                <div class="card-body text-center">
                    <h6 class="fw-bold">جينز Wide Leg رمادي</h6>
                    <p class="price mb-2" style="color: #B12704; font-weight: bold;">7,500 د.ج</p>
                    <button class="btn btn-sm w-100 fw-bold" style="background-color: #febd69;" onclick="openOrderModal('سروال جينز رمادي - 7500 دج')">اطلب الآن</button>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm border-0 p-2">
                <img src="https://images.unsplash.com/photo-1591195853828-11db59a44f6b?auto=format&fit=crop&w=500&q=80" class="card-img-top rounded" alt="Denim Shorts">
                <div class="card-body text-center">
                    <h6 class="fw-bold">light blue denim shorts</h6>
                    <p class="price mb-2" style="color: #B12704; font-weight: bold;">6,500 د.ج</p>
                    <button class="btn btn-sm w-100 fw-bold" style="background-color: #febd69;" onclick="openOrderModal('شورت جينز أزرق - 6500 دج')">اطلب الآن</button>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm border-0 p-2">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80" class="card-img-top rounded" alt="Nike TN">
                <div class="card-body text-center">
                    <h6 class="fw-bold">حذاء Nike TN الملكي</h6>
                    <p class="price mb-2" style="color: #B12704; font-weight: bold;">11,000 د.ج</p>
                    <button class="btn btn-sm w-100 fw-bold" style="background-color: #febd69;" onclick="openOrderModal('حذاء Nike TN - 11000 دج')">اطلب الآن</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">تأكيد طلب المنتج</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form action="https://formspree.io/f/xaqaepar" method="POST">
                    <div class="mb-3">
                        <label class="form-label">المنتج المختار:</label>
                        <input type="text" id="selectedProduct" name="product_name" class="form-control" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">اسمك الكامل:</label>
                        <input type="text" name="customer_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رقم الهاتف:</label>
                        <input type="tel" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">العنوان:</label>
                        <textarea name="address" class="form-control" rows="2" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">إرسال الطلبية</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openOrderModal(productName) {
        document.getElementById('selectedProduct').value = productName;
        var myModal = new bootstrap.Modal(document.getElementById('orderModal'));
        myModal.show();
    }
</script>

</body>
</html>
